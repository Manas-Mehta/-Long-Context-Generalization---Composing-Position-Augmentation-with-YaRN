# RPE Configuration for MRCR — Curriculum Learning
#
# Gradually increases L from near-sequential to target over 5 epochs.
# Training on bin 0 (max 8192 tokens), targeting bin 2 (max 32768 tokens).
#
# Schedule rationale:
#   Epoch 1: L=10240  — 1.25x max seq, near-sequential (avg gap ~1.3)
#   Epoch 2: L=16384  — 2x max seq, mild randomization (avg gap ~2.0)
#   Epoch 3: L=24576  — 3x max seq, moderate randomization (avg gap ~3.1)
#   Epoch 4: L=32768  — 4x max seq = bin 2 max, target (avg gap ~4.1)
#   Epoch 5: L=32768  — consolidation at target
#
# Mirrors Phase 2 CCoT curriculum (best result: 75% length extension).
# Lets LoRA first learn the MRCR task, then progressively learn position-invariance.

rpe:
  enabled: true
  max_simulation_length: 32768
  seed: null
  training_mode: true
  inference_mode: false
  curriculum:
    1: 10240
    2: 16384
    3: 24576
    4: 32768
    5: 32768
