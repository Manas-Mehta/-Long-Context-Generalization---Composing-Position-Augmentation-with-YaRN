# RPE (Randomized Positional Encodings) Configuration
# Used by rpe_llamafactory_patch.py to configure RPE during LLaMA-Factory training.
#
# To enable RPE:  set enabled: true
# To disable RPE: set enabled: false (baseline training)

rpe:
  # Master switch — set to false for baseline comparison runs
  enabled: true

  # Upper bound L for position sampling. Positions are sampled from [0, L).
  # Should be >> max training sequence length.
  # Paper default: 8192. Qwen2.5 supports up to 32768.
  max_simulation_length: 8192

  # Random seed for position generation (null = non-deterministic).
  # Set to an integer for reproducible position sequences.
  seed: null

  # Whether to randomize positions during the training forward pass.
  # true  = RPE active (positions are randomized) — standard RPE usage
  # false = RPE inactive (standard sequential positions) — for ablation
  training_mode: true

  # Whether to randomize positions during evaluation/inference within training.
  # false = standard sequential positions during eval (recommended)
  # true  = randomized positions during eval too (for research/ablation)
  inference_mode: false
