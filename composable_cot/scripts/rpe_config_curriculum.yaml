# RPE Configuration — Curriculum Learning
# Gradually increases L across epochs instead of jumping straight to target.
# Lets LoRA first learn the task, then progressively learn position-invariance.
#
# IMPORTANT: L must be >= max tokenized sequence length (~576 tokens for
# reverse_string with CoT, length 40). Raw string is 40 chars but the
# tokenized CoT trace is much longer.
#
# Schedule rationale (reverse_string, tokenized seq ~576 tokens):
#   Epoch 1: L=640  — barely above seq length, avg gap ~1.1 (near sequential)
#   Epoch 2: L=768  — mild randomization, avg gap ~1.3
#   Epoch 3: L=896  — moderate, avg gap ~1.6
#   Epoch 4: L=1024 — target (matches Exp1), avg gap ~1.8
#   Epoch 5: L=1024 — hold at target for consolidation

rpe:
  enabled: true
  max_simulation_length: 1024
  seed: null
  training_mode: true
  inference_mode: false
  curriculum:
    1: 640
    2: 768
    3: 896
    4: 1024
    5: 1024
