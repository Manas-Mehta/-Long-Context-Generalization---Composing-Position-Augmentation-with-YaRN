# RPE Configuration — L=1024
# Scaled down from L=8192 based on DeepMind paper analysis:
#   DeepMind default: L=2048, trained from scratch with 100% params
#   Our setup: LoRA with 0.26% params, max test sequence ~500 tokens
#   L=1024 gives 2x margin over max test length with avg gap ~5 (vs ~41 with L=8192)

rpe:
  enabled: true
  max_simulation_length: 1024
  seed: null
  training_mode: true
  inference_mode: false
